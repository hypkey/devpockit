# Deploy to GitHub Pages (for forks)
# For self-hosting: Fork the repo, enable GitHub Pages (Source: GitHub Actions)
# Skipped for upstream repo (hypkey/devpockit) which uses release.yml for tag-based deploys
#
# Deploy options:
# - Leave "Ref" empty to deploy from default branch (main) - includes unreleased changes after sync
# - Enter a tag (e.g. v0.1.7) to deploy a specific release - stable, matches upstream production
name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Ref to deploy (tag e.g. v0.1.7, or branch). Empty = default branch'
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    if: github.repository != 'hypkey/devpockit'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.event.repository.default_branch }}
          fetch-depth: ${{ inputs.ref && '0' || '1' }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Set base URL for GitHub Pages
        id: base_url
        run: |
          # Use repo variables if set (Settings → Secrets and variables → Actions → Variables)
          # Otherwise use default: https://owner.github.io/repo-name
          if [ -n "${{ vars.NEXT_PUBLIC_BASE_URL }}" ]; then
            echo "base_url=${{ vars.NEXT_PUBLIC_BASE_URL }}" >> $GITHUB_OUTPUT
            echo "base_path=${{ vars.BASE_PATH }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}.github.io" ]; then
            echo "base_url=https://${{ github.repository_owner }}.github.io" >> $GITHUB_OUTPUT
            echo "base_path=" >> $GITHUB_OUTPUT
          else
            echo "base_url=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}" >> $GITHUB_OUTPUT
            echo "base_path=/${{ github.event.repository.name }}" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build
        env:
          NEXT_PUBLIC_BASE_URL: ${{ steps.base_url.outputs.base_url }}
          BASE_PATH: ${{ steps.base_url.outputs.base_path }}
          NEXT_PUBLIC_APP_VERSION: ${{ steps.version.outputs.version }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
